services:
  streamlit-app:
    build: .
    container_name: ai-incident-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - elasticsearch
    volumes:
      - ./logs:/app/logs
      - ./alerts:/app/alerts
      - ./runtime:/app/runtime
    restart: unless-stopped

  monitor-worker:
    build: .
    container_name: ai-incident-monitor-worker
    command: python monitor_worker.py
    env_file:
      - .env
    depends_on:
      - elasticsearch
    volumes:
      - ./logs:/app/logs
      - ./alerts:/app/alerts
      - ./runtime:/app/runtime
    restart: unless-stopped

  auto-investigator:
    build: .
    container_name: ai-incident-auto-investigator
    command: python auto_investigator.py
    env_file:
      - .env
    depends_on:
      - elasticsearch
      - monitor-worker
    volumes:
      - ./logs:/app/logs
      - ./alerts:/app/alerts
      - ./runtime:/app/runtime
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: ai-incident-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  elasticsearch-data: